name: Update Personal Notes

on:
  schedule:
    - cron: "35 18 * * *" # Runs daily at 00:05 IST (18:35 UTC previous day)
  workflow_dispatch:
    inputs:
      commit_count:
        description: "Optional fixed commit count for this run (3-800)"
        required: false

# Queue concurrent runs instead of running them simultaneously.
# Without this, two quick manual triggers both checkout the same SHA,
# both push, and one push gets silently rejected (non-fast-forward) —
# losing that run's commits entirely.
concurrency:
  group: personal-notes-update
  cancel-in-progress: false

jobs:
  update-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Always fetch the latest HEAD so a queued run gets the commits
          # that the previous run already pushed.
          fetch-depth: 0

      - name: Configure Git
        env:
          GIT_USER_EMAIL: ${{ secrets.COMMIT_USER_EMAIL }}
        run: |
          if [ -z "$GIT_USER_EMAIL" ]; then
            echo "Missing COMMIT_USER_EMAIL secret"
            exit 1
          fi

          git config user.name "Aniket886"
          git config user.email "$GIT_USER_EMAIL"

      - name: Update Personal Notes
        shell: bash
        env:
          NOTE_FILE: public/notes/journal.md
          IDEA_FILE: public/notes/ideas.md
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.3-70b-versatile
          AI_MODE: ${{ github.event_name == 'schedule' && 'auto' || 'manual' }}
          MIN_COMMITS: 3
          AUTO_MAX_COMMITS: 20
          MANUAL_MAX_COMMITS: 800
          BRANCH_NAME: main
          INPUT_COMMIT_COUNT: ${{ github.event.inputs.commit_count }}
          COMMIT_TIMEZONE: Asia/Kolkata
        run: |
          set -euo pipefail

          if [ -n "${INPUT_COMMIT_COUNT:-}" ]; then
            if ! [[ "$INPUT_COMMIT_COUNT" =~ ^[0-9]+$ ]] || [ "$INPUT_COMMIT_COUNT" -lt "$MIN_COMMITS" ] || [ "$INPUT_COMMIT_COUNT" -gt "$MANUAL_MAX_COMMITS" ]; then
              echo "manual commit_count must be an integer between $MIN_COMMITS and $MANUAL_MAX_COMMITS"
              exit 1
            fi
            commit_count="$INPUT_COMMIT_COUNT"
          else
            commit_count=$(( RANDOM % (AUTO_MAX_COMMITS - MIN_COMMITS + 1) + MIN_COMMITS ))
          fi

          run_seed=$RANDOM
          last_commit_epoch=0

          for ((i=1; i<=commit_count; i++)); do
            current_epoch="$(date +%s)"
            if [ "$current_epoch" -le "$last_commit_epoch" ]; then
              commit_epoch=$((last_commit_epoch + 1))
            else
              commit_epoch="$current_epoch"
            fi
            last_commit_epoch="$commit_epoch"

            commit_time=$(TZ="$COMMIT_TIMEZONE" date -d "@$commit_epoch" '+%Y-%m-%dT%H:%M:%S%z')
            commit_message="$(NOTE_FILE="$NOTE_FILE" IDEA_FILE="$IDEA_FILE" COMMIT_TIME="$commit_time" COMMIT_TIMEZONE="$COMMIT_TIMEZONE" COMMIT_INDEX="$i" RUN_SEED="$run_seed" bash scripts/update_personal_notes.sh)"
            git add "$NOTE_FILE" "$IDEA_FILE"
            GIT_AUTHOR_DATE="$commit_time" GIT_COMMITTER_DATE="$commit_time" git commit -m "$commit_message"
          done

          # Pull any commits that landed while this run was executing (e.g. another
          # queued run that slipped through, or a direct push). Rebase keeps history
          # linear and avoids merge commits polluting the contribution graph.
          git pull --rebase origin "$BRANCH_NAME"

          git push origin "$BRANCH_NAME"

      - name: Trigger streak SVG refresh in profile repo
        continue-on-error: true   # notes are already pushed — don't fail the job if trigger errors
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "${GH_PAT:-}" ]; then
            echo "GH_PAT secret not configured — skipping streak trigger."
            echo "Add a PAT with 'workflow' scope as GH_PAT in this repo's secrets to enable."
            exit 0
          fi
          GH_TOKEN="$GH_PAT" gh workflow run update-streak.yml \
            --repo Aniket886/Aniket886 \
            --ref main
          echo "Streak update triggered in Aniket886/Aniket886."
