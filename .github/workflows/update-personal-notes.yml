name: Update Personal Notes

on:
  schedule:
    - cron: "35 18 * * *" # Runs daily at 00:05 IST (18:35 UTC previous day)
  workflow_dispatch:
    inputs:
      commit_count:
        description: "Optional fixed commit count for this run (10-800)"
        required: false

jobs:
  update-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Git
        env:
          GIT_USER_EMAIL: ${{ secrets.COMMIT_USER_EMAIL }}
        run: |
          if [ -z "$GIT_USER_EMAIL" ]; then
            echo "Missing COMMIT_USER_EMAIL secret"
            exit 1
          fi

          git config user.name "Aniket886"
          git config user.email "$GIT_USER_EMAIL"

      - name: Update Personal Notes
        shell: bash
        env:
          NOTE_FILE: public/notes/journal.md
          IDEA_FILE: public/notes/ideas.md
          MIN_COMMITS: 10
          AUTO_MAX_COMMITS: 50
          MANUAL_MAX_COMMITS: 800
          BRANCH_NAME: main
          INPUT_COMMIT_COUNT: ${{ github.event.inputs.commit_count }}
          COMMIT_TIMEZONE: Asia/Kolkata
        run: |
          set -euo pipefail

          if [ -n "${INPUT_COMMIT_COUNT:-}" ]; then
            if ! [[ "$INPUT_COMMIT_COUNT" =~ ^[0-9]+$ ]] || [ "$INPUT_COMMIT_COUNT" -lt "$MIN_COMMITS" ] || [ "$INPUT_COMMIT_COUNT" -gt "$MANUAL_MAX_COMMITS" ]; then
              echo "manual commit_count must be an integer between $MIN_COMMITS and $MANUAL_MAX_COMMITS"
              exit 1
            fi
            commit_count="$INPUT_COMMIT_COUNT"
          else
            commit_count=$(( RANDOM % (AUTO_MAX_COMMITS - MIN_COMMITS + 1) + MIN_COMMITS ))
          fi

          commit_day=$(TZ="$COMMIT_TIMEZONE" date +%F)
          run_seed=$RANDOM

          for ((i=1; i<=commit_count; i++)); do
            commit_time=$(TZ="$COMMIT_TIMEZONE" date -d "$commit_day 00:05:00 +$((i - 1)) seconds" '+%Y-%m-%dT%H:%M:%S%z')
            commit_message="$(NOTE_FILE="$NOTE_FILE" IDEA_FILE="$IDEA_FILE" COMMIT_TIME="$commit_time" COMMIT_TIMEZONE="$COMMIT_TIMEZONE" COMMIT_INDEX="$i" RUN_SEED="$run_seed" bash scripts/update_personal_notes.sh)"
            git add "$NOTE_FILE" "$IDEA_FILE"
            GIT_AUTHOR_DATE="$commit_time" GIT_COMMITTER_DATE="$commit_time" git commit -m "$commit_message"
          done

          git push origin "$BRANCH_NAME"
