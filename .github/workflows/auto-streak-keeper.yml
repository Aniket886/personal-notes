name: Maintain GitHub Streak

on:
  schedule:
    - cron: "35 18 * * *" # Runs daily at 00:05 IST (18:35 UTC previous day)
  workflow_dispatch:
    inputs:
      commit_count:
        description: "Optional fixed commit count for this run (10-69)"
        required: false

jobs:
  auto-streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure Git
        env:
          GIT_USER_EMAIL: ${{ secrets.GITHUB_USER_EMAIL }}
        run: |
          if [ -z "$GIT_USER_EMAIL" ]; then
            echo "Missing GITHUB_USER_EMAIL secret"
            exit 1
          fi

          git config user.name "Aniket886"
          git config user.email "$GIT_USER_EMAIL"

      - name: Run Auto-Streak Keeper
        shell: bash
        env:
          FILE_PATH: public/auto-streak/data.txt
          MIN_COMMITS: 10
          MAX_COMMITS: 69
          BRANCH_NAME: main
          INPUT_COMMIT_COUNT: ${{ github.event.inputs.commit_count }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_COMMIT_COUNT:-}" ]; then
            if ! [[ "$INPUT_COMMIT_COUNT" =~ ^[0-9]+$ ]] || [ "$INPUT_COMMIT_COUNT" -lt "$MIN_COMMITS" ] || [ "$INPUT_COMMIT_COUNT" -gt "$MAX_COMMITS" ]; then
              echo "commit_count must be an integer between $MIN_COMMITS and $MAX_COMMITS"
              exit 1
            fi
            commit_count="$INPUT_COMMIT_COUNT"
          else
            commit_count=$(( RANDOM % (MAX_COMMITS - MIN_COMMITS + 1) + MIN_COMMITS ))
          fi

          mkdir -p "$(dirname "$FILE_PATH")"
          touch "$FILE_PATH"

          for ((i=1; i<=commit_count; i++)); do
            printf '%s commit-%02d of %02d\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" "$i" "$commit_count" >> "$FILE_PATH"
            git add "$FILE_PATH"
            git commit -m "Daily streak maintenance"
          done

          git push origin "$BRANCH_NAME"
